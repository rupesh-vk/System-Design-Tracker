<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design — 6-Week Hybrid Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;padding:24px 16px 48px}
.app{max-width:860px;margin:0 auto}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.top-bar h1{font-size:18px;font-weight:500;color:#1a1a1a}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;border:0.5px solid;font-weight:500}
.b-karan{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.b-primer{background:#E1F5EE;color:#085041;border-color:#5DCAA5}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:.75rem 1rem;text-align:center;border:0.5px solid #e0ddd5}
.stat-val{font-size:22px;font-weight:500;line-height:1.2;color:#1a1a1a}
.stat-lbl{font-size:11px;color:#888;margin-top:3px}

.week-tabs{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
.week-tab{flex-shrink:0;font-size:12px;font-weight:500;padding:5px 13px;border-radius:99px;border:0.5px solid #ccc;background:#fff;cursor:pointer;color:#666;transition:all .15s}
.week-tab.active{color:#fff;border-color:transparent}

.week-panel{display:none}
.week-panel.active{display:block}

.week-intro{padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem;border:0.5px solid}
.week-intro p{font-size:13px;line-height:1.6}
.week-intro .theme{font-size:12px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:6px}

.day-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;margin-bottom:.75rem;overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:.7rem 1rem;cursor:pointer;user-select:none}
.day-header:hover{background:#f9f8f5}
.day-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;flex-shrink:0;color:#fff;min-width:42px;text-align:center}
.day-name{font-size:14px;font-weight:500;flex:1;color:#1a1a1a}
.day-progress{font-size:11px;color:#888;flex-shrink:0}
.day-chev{font-size:10px;color:#aaa;flex-shrink:0;transition:transform .2s}

.day-body{display:none;border-top:0.5px solid #e8e5dd}
.day-body.open{display:block}

.source-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:99px;margin-bottom:.6rem;font-weight:500}
.src-k{background:#EEEDFE;color:#534AB7}
.src-p{background:#E1F5EE;color:#0F6E56}
.src-b{background:#FAEEDA;color:#854F0B}

.tasks-section{padding:.75rem 1rem}
.tasks-label{font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:0.5px solid #eeece6;cursor:pointer}
.task-item:last-child{border-bottom:none}
.task-item.done .task-text{text-decoration:line-through;color:#bbb}
.checkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.checkbox.checked{border-color:transparent}
.check-inner{font-size:10px;color:#fff;display:none}
.checkbox.checked .check-inner{display:block}
.task-text{font-size:13px;line-height:1.5;color:#1a1a1a}
.task-meta{font-size:11px;color:#999;margin-top:2px}

.progress-track{height:3px;background:#f0ede6;border-radius:2px;margin-top:6px}
.progress-fill-bar{height:100%;border-radius:2px;transition:width .3s}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-tabs{flex-wrap:nowrap}
}
</style>
</head>

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getKey(wi,di,ti){return `sd-${wi}-${di}-${ti}`}

function loadState(){
  const keys=[];
  WEEKS.forEach((w,wi)=>w.days.forEach((d,di)=>d.tasks.forEach((_,ti)=>keys.push(getKey(wi,di,ti)))));
  return keys.reduce((acc,k)=>{
    try{const v=localStorage.getItem(k); if(v)acc[k]=true;}catch(e){}
    return acc;
  },{});
}

function saveKey(k,v){try{if(v)localStorage.setItem(k,'1');else localStorage.removeItem(k);}catch(e){}}

let state=loadState();

function updateStats(){
  let done=0,total=0;
  WEEKS.forEach((w,wi)=>w.days.forEach((d,di)=>d.tasks.forEach((_,ti)=>{
    total++;
    if(state[getKey(wi,di,ti)])done++;
  })));
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-pct').textContent=Math.round(done/total*100)+'%';
}

function calcStreak(){
  let streak=0;
  outer:for(let wi=0;wi<WEEKS.length;wi++){
    for(let di=0;di<WEEKS[wi].days.length;di++){
      const tasks=WEEKS[wi].days[di].tasks;
      const allDone=tasks.every((_,ti)=>state[getKey(wi,di,ti)]);
      if(allDone)streak++;
      else break outer;
    }
  }
  document.getElementById('s-streak').textContent=streak;
}

function updateDayProgress(wi,di){
  const tasks=WEEKS[wi].days[di].tasks;
  const done=tasks.filter((_,ti)=>state[getKey(wi,di,ti)]).length;
  const el=document.getElementById(`dprog-${wi}-${di}`);
  const bar=document.getElementById(`dbar-${wi}-${di}`);
  if(el)el.textContent=`${done}/${tasks.length}`;
  if(bar)bar.style.width=Math.round(done/tasks.length*100)+'%';
}

function toggleTask(wi,di,ti,cb,itemEl){
  const k=getKey(wi,di,ti);
  const now=!state[k];
  state[k]=now;
  saveKey(k,now);
  cb.classList.toggle('checked',now);
  cb.querySelector('.check-inner').style.display=now?'block':'none';
  if(now){cb.style.background=WEEKS[wi].color;cb.style.borderColor=WEEKS[wi].color;}
  else{cb.style.background='';cb.style.borderColor='';}
  itemEl.classList.toggle('done',now);
  updateDayProgress(wi,di);
  updateStats();
  calcStreak();
}

function buildPanel(wi){
  const w=WEEKS[wi];
  const div=document.createElement('div');
  div.className='week-panel';
  div.id=`panel-${wi}`;

  const intro=document.createElement('div');
  intro.className='week-intro';
  intro.style.cssText=`background:${w.light};border-color:${w.border}`;
  intro.innerHTML=`<div class="theme" style="color:${w.color}"><span>Week ${wi+1}</span><span style="font-weight:400;color:${w.textc}">${w.title}</span></div><p style="color:${w.textc}">${w.intro}</p>`;
  div.appendChild(intro);

  w.days.forEach((d,di)=>{
    const card=document.createElement('div');
    card.className='day-card';

    const hdr=document.createElement('div');
    hdr.className='day-header';
    hdr.innerHTML=`
      <span class="day-pill" style="background:${w.color}">${DAYS[di]}</span>
      <span class="day-name">${d.name}</span>
      <span class="day-progress" id="dprog-${wi}-${di}">0/${d.tasks.length}</span>
      <span class="day-chev" id="chev-${wi}-${di}">▼</span>
    `;

    const body=document.createElement('div');
    body.className='day-body';
    body.id=`body-${wi}-${di}`;

    const inner=document.createElement('div');
    inner.className='tasks-section';
    inner.innerHTML=`<div class="source-tag ${SRC_CLASS[d.src]}">${SRC_LABELS[d.src]}</div><div class="tasks-label">Today's tasks</div>`;

    d.tasks.forEach((task,ti)=>{
      const k=getKey(wi,di,ti);
      const isDone=!!state[k];
      const item=document.createElement('div');
      item.className='task-item'+(isDone?' done':'');
      item.innerHTML=`
        <div class="checkbox${isDone?' checked':''}" style="${isDone?`background:${w.color};border-color:${w.color}`:''}">
          <span class="check-inner" style="display:${isDone?'block':'none'}">✓</span>
        </div>
        <div>
          <div class="task-text">${task.t}</div>
          <div class="task-meta">${task.note}</div>
        </div>
      `;
      const cb=item.querySelector('.checkbox');
      item.addEventListener('click',()=>toggleTask(wi,di,ti,cb,item));
      inner.appendChild(item);
    });

    const ptrack=document.createElement('div');
    ptrack.className='progress-track';
    ptrack.style.marginTop='10px';
    const pfill=document.createElement('div');
    pfill.className='progress-fill-bar';
    pfill.id=`dbar-${wi}-${di}`;
    pfill.style.cssText=`background:${w.color};width:0%`;
    ptrack.appendChild(pfill);
    inner.appendChild(ptrack);

    body.appendChild(inner);
    card.appendChild(hdr);
    card.appendChild(body);

    hdr.addEventListener('click',()=>{
      const isOpen=body.classList.contains('open');
      body.classList.toggle('open',!isOpen);
      document.getElementById(`chev-${wi}-${di}`).style.transform=isOpen?'':'rotate(180deg)';
    });

    div.appendChild(card);
    updateDayProgress(wi,di);
  });

  return div;
}

const tabsEl=document.getElementById('week-tabs');
const panelsEl=document.getElementById('panels');

WEEKS.forEach((w,wi)=>{
  const tab=document.createElement('div');
  tab.className='week-tab'+(wi===0?' active':'');
  tab.textContent=`W${wi+1}: ${w.title.split(' ').slice(0,3).join(' ')}`;
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.week-tab').forEach(t=>{t.classList.remove('active');t.style.background='';t.style.color='';});
    document.querySelectorAll('.week-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    tab.style.background=w.color;
    tab.style.color='#fff';
    document.getElementById(`panel-${wi}`).classList.add('active');
  });
  if(wi===0){tab.style.background=w.color;tab.style.color='#fff';}
  tabsEl.appendChild(tab);
  const panel=buildPanel(wi);
  panelsEl.appendChild(panel);
});

document.getElementById('panel-0').classList.add('active');
updateStats();
calcStreak();
</script>
</body>
</html>
